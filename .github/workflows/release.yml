# Tag 觸發的發佈流程：跑測試 → build image → 推到 GHCR。
# 主機上的 Watchtower（見 docker-compose.yml）每 5 分鐘檢查一次，
# 發現新 image 就自動 pull 並重開 app 容器。
#
# 用法：
#   git tag v1.0.0 && git push origin v1.0.0
#
# 注意：GHCR 映像名必須全小寫，所以這裡寫死 daniel07607014，
# 不用 ${{ github.repository_owner }}（那個值含大寫會導致 push 失敗）。

name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/daniel07607014/ic-dashboard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # 跟 Dockerfile 的 runtime 版本一致
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
