services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ic-dashboard:latest
    container_name: ic-dashboard-app
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Taipei}
      COOKIE_KEY: ${COOKIE_KEY:?COOKIE_KEY must be set in .env}
      COOKIE_NAME: ${COOKIE_NAME:-ic_dashboard_auth}
      COOKIE_EXPIRY_DAYS: ${COOKIE_EXPIRY_DAYS:-7}
    volumes:
      - ./data:/app/data
      - ./config/auth_config.yaml:/app/config/auth_config.yaml:ro
    expose:
      - "8501"
    networks:
      - dashboard-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ic-dashboard-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge
